version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: streamflix-db
    environment:
      POSTGRES_USER: streamflix
      POSTGRES_PASSWORD: streamflix_password
      POSTGRES_DB: streamflix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamflix"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamflix-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: streamflix-backend
    environment:
      DATABASE_URL: postgresql://streamflix:streamflix_password@db:5432/streamflix
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your_super_secret_jwt_key_change_this}
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - streamflix-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamflix-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: StreamFlix
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - streamflix-network

volumes:
  postgres_data:

networks:
  streamflix-network:
    driver: bridge
