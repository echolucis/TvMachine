<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV/EPG Guide</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0f0f0f;
      color: #fff;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 350px;
      grid-template-rows: 60px 1fr;
      height: 100vh;
      gap: 1px;
      background: #1a1a1a;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
      border-bottom: 1px solid #333;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #00d4aa;
    }

    .search-box {
      flex: 1;
      max-width: 400px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 15px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }

    .search-box input:focus {
      outline: none;
      border-color: #00d4aa;
    }

    .health-status {
      font-size: 12px;
      color: #888;
    }

    .health-status.ok {
      color: #00d4aa;
    }

    /* Channel List */
    .channel-list {
      background: #141414;
      overflow-y: auto;
      border-right: 1px solid #333;
    }

    .channel-item {
      padding: 12px 15px;
      cursor: pointer;
      border-bottom: 1px solid #222;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channel-item:hover {
      background: #222;
    }

    .channel-item.active {
      background: #00d4aa20;
      border-left: 3px solid #00d4aa;
    }

    .channel-logo {
      width: 40px;
      height: 40px;
      background: #333;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
    }

    .channel-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .channel-info {
      flex: 1;
      min-width: 0;
    }

    .channel-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-group {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .channel-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
    }

    .channel-status.active {
      background: #00d4aa;
    }

    .channel-status.dead {
      background: #ff4444;
    }

    /* EPG Timeline */
    .epg-container {
      background: #0f0f0f;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .time-axis {
      height: 40px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 100px;
      font-size: 12px;
      color: #888;
      overflow: hidden;
    }

    .programme-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .programme-item {
      padding: 15px;
      background: #1a1a1a;
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 3px solid transparent;
    }

    .programme-item.current {
      border-left-color: #00d4aa;
      background: #00d4aa10;
    }

    .programme-time {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .programme-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .programme-description {
      font-size: 13px;
      color: #aaa;
      line-height: 1.4;
    }

    /* Video Player */
    .player-container {
      background: #000;
      display: flex;
      flex-direction: column;
    }

    .video-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      max-height: 60vh;
    }

    .player-info {
      padding: 15px;
      background: #141414;
      border-top: 1px solid #333;
    }

    .now-playing {
      font-size: 14px;
      color: #888;
      margin-bottom: 5px;
    }

    .current-show {
      font-size: 16px;
      font-weight: 500;
    }

    .no-channel {
      color: #666;
      text-align: center;
      padding: 40px;
    }

    /* Search Results Modal */
    .search-results {
      position: absolute;
      top: 60px;
      left: 280px;
      right: 350px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      max-height: 400px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .search-results.visible {
      display: block;
    }

    .search-result-item {
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
    }

    .search-result-item:hover {
      background: #222;
    }

    .search-result-title {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .search-result-channel {
      font-size: 12px;
      color: #888;
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">📺 IPTV Guide</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search programmes..." />
      </div>
      <div class="health-status" id="healthStatus">Loading...</div>
    </header>

    <!-- Channel List -->
    <aside class="channel-list" id="channelList">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </aside>

    <!-- EPG Timeline -->
    <main class="epg-container">
      <div class="time-axis" id="timeAxis"></div>
      <div class="programme-list" id="programmeList">
        <div class="no-channel">Select a channel to view programme guide</div>
      </div>
    </main>

    <!-- Video Player -->
    <aside class="player-container">
      <div class="video-wrapper">
        <video id="videoPlayer" controls></video>
      </div>
      <div class="player-info" id="playerInfo" style="display: none;">
        <div class="now-playing">Now Playing</div>
        <div class="current-show" id="currentShow">-</div>
      </div>
    </aside>
  </div>

  <!-- Search Results -->
  <div class="search-results" id="searchResults"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
